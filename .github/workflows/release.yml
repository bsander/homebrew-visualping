name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'Formula/**'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode 16.3
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build
        run: make release

      - name: Test
        run: swift test

      - name: Compute version
        id: version
        run: |
          BASE="v0.$(date +%Y.%m%d)"
          TAG="$BASE"
          SUFFIX=1
          while git rev-parse "$TAG" >/dev/null 2>&1; do
            TAG="${BASE}.${SUFFIX}"
            SUFFIX=$((SUFFIX + 1))
          done
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create source tarball
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git archive --format=tar.gz --prefix="visualping-${TAG}/" "$TAG" -o "visualping-${TAG}.tar.gz"

      - name: Create binary tarball
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          STAGING=$(mktemp -d)
          cp .build/apple/Products/Release/visualping "$STAGING/"
          tar -czf "visualping-${TAG}-macos.tar.gz" -C "$STAGING" visualping

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            "visualping-${TAG}-macos.tar.gz" \
            "visualping-${TAG}.tar.gz" \
            --generate-notes

      - name: Update formula
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          SHA256=$(shasum -a 256 "visualping-${TAG}-macos.tar.gz" | awk '{print $1}')
          ASSET_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/visualping-${TAG}-macos.tar.gz"
          VERSION="${TAG#v}"
          sed -i '' "s|url \".*\"|url \"${ASSET_URL}\"|" Formula/visualping.rb
          sed -i '' "s|version \".*\"|version \"${VERSION}\"|" Formula/visualping.rb
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/visualping.rb

      - name: Commit and push formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/visualping.rb
          git commit -m "Update formula for ${{ steps.version.outputs.tag }} [skip ci]"
          git push origin main
